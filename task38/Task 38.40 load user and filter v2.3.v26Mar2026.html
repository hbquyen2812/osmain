<!DOCTYPE html>
<html lang="en">

<head>
  <title>Task 38.40</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>

<body onload="onPageLoading()">
  <div class="container">
    <div class="text-center mt-3 mb-3">
      <h2>F100 - Quản trị người dùng</h2>
    </div>
    <div class="jumbotron container">
      <div class="row form-group">
        <label class="col-sm-2 col-form-label" for="firstNameInput">First name</label>
        <div class="col-sm-3">
          <input type="text" id="firstNameInput" class="form-control" placeholder="Nhap first name ...">
        </div>
        <label class="col-sm-2 col-form-label" for="lastNameInput">Last name</label>
        <div class="col-sm-3">
          <input type="text" id="lastNameInput" class="form-control" placeholder="Nhap last name ...">
        </div>
        <div class="col-sm-2">
          <button class="btn btn-success" id="btn-filter">Filter user</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container mt-2">
    <div class="row">
      <div class="col-12 text-nowrap">
        <table id="table-users" class="table table-bordered table-striped table-hover">
          <thead>
            <tr>
              <th>Mã người dùng</th>
              <th>Firstname</th>
              <th>Lastname</th>
              <th>Country</th>
              <th>Subject</th>
              <th>Customer Type</th>
              <th>Register Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>

          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>

<script>
  "use strict";
  /*** REGION 1 - Global variables - Vùng khai báo biến, hằng số, tham số TOÀN CỤC */
  var gUsersArr = [];

  /*** REGION 2 - Vùng gán / thực thi hàm xử lý sự kiện cho các elements */
  $("#btn-filter").on("click", onBtnFilterClick);
  $("#table-users").on("click", ".btn-detail", function(){
    onBtnDetailClick(this);
  });

  /*** REGION 3 - Event handlers - Vùng khai báo các hàm xử lý sự kiện */
  /**
   * Call API để get all users và lưu vào mảng toàn cục gUsersArr.
   * gUsersArr được sử dụng cho mục đích filter về sau
  */
  // Hàm thực thi khi load trang
  function onPageLoading() {
    // gọi api load dữ liệu users
    $.ajax({
      url: 'https://user-api.onschoolbootcamp.edu.vn/users/',
      type: 'GET',
      dataType: 'json',
      async: false,
      success: function (paramObjectUser) {
        gUsersArr = paramObjectUser;
      }
    });

    // gọi hàm để load dữ liệu mảng users vào table
    fillDataTableUser(gUsersArr);
  }

  function onBtnFilterClick() {
    "use strict";
    // b0: tao doi tuong de truyen qua cac buoc
    var vFilterObj = {
      firstname: "",
      lastname: ""
    }
    // b1: thu thap du lieu
    readData(vFilterObj);
    // b2: validate (k can)

    // b3: tim kiem va xu ly hien thi
    var vArrUserFiltered = findUserByFilter(vFilterObj);
    var vTable = $("#table-users");
    vTable.find("tr:gt(0)").html('');
    if (vArrUserFiltered.length > 0) {
      alert("Tim thay " + vArrUserFiltered.length + " ket qua");
      fillDataTableUser(vArrUserFiltered);
    }
    else {
      alert("Khong tim thay ket qua nao");
      return false;
    }
  }

  function onBtnDetailClick(paramBtnDetail) {
    "use strict";
    var vRow = $(paramBtnDetail).closest("tr");
    var vUserId = vRow.find("td:eq(0)").text();
    console.log("Chi tiet user co id = " + vUserId);
    alert("Chi tiet user co id = " + vUserId);
    
  }


  /*** REGION 4 - Common funtions - Vùng khai báo hàm dùng chung trong toàn bộ chương trình*/

  /**
   * Hàm load data vào table
   * Input: mảng users
   * Output: table có dữ liệu
   */
  function fillDataTableUser(paramObjectUser) {
    var vUserTable = $('#table-users');
    for (var bI = 0; bI < paramObjectUser.length; bI++) {
      var bNewRow = $('<tr/>').appendTo(vUserTable);
      var bId = $('<td/>', {
        html: paramObjectUser[bI].id
      }).appendTo(bNewRow);

      var vFirstName = $('<td/>', {
        html: paramObjectUser[bI].firstname
      }).appendTo(bNewRow);

      var vLastName = $('<td/>', {
        html: paramObjectUser[bI].lastname
      }).appendTo(bNewRow);

      var vCountry = $('<td/>', {
        html: paramObjectUser[bI].country
      }).appendTo(bNewRow);

      var vSubject = $('<td/>', {
        html: paramObjectUser[bI].subject
      }).appendTo(bNewRow);

      var vCustomerType = $('<td/>', {
        html: paramObjectUser[bI].customerType
      }).appendTo(bNewRow);

      var vRegisterStatus = $('<td/>', {
        html: paramObjectUser[bI].registerStatus
      }).appendTo(bNewRow);

      var vAction = $('<td/>').appendTo(bNewRow);
      var vDetailButon = $("<button/>", {
        text: "Chi tiết"
      }).addClass("btn btn-primary btn-detail")
        .appendTo(vAction);
    }
  }

  function readData(paramFilterObj) {
    paramFilterObj.firstname = $("#firstNameInput").val().trim();
    paramFilterObj.lastname = $("#lastNameInput").val().trim();
  }

  /* Hàm xử lý việc tìm kiếm user
- input/start: paramKeyWordObj là 1 object chứa các keyword đã thu thập từ form: firstname và lastname
- output/end: trả về 1 array gồm các object (user)
*/
  function findUserByFilter(paramKeyWordObj) {
    "use strict";

    const keyFirstName = paramKeyWordObj.firstname.toLowerCase();
    const keyLastName = paramKeyWordObj.lastname.toLowerCase();

    // Nếu cả 2 ô đều bỏ trống -> không có gì để lọc, trả mảng rỗng
    if (keyFirstName === "" && keyLastName === "") {
      return [];
    }

    // Cờ đánh dấu: người dùng có nhập ĐỦ cả 2 ô hay không
    const isBothFieldsFilled = keyFirstName !== "" && keyLastName !== "";

    return gUsersArr.filter(function (userItem) {
      const isFirstNameMatch = keyFirstName !== "" && userItem.firstname.toLowerCase() === keyFirstName;
      const isLastNameMatch = keyLastName !== "" && userItem.lastname.toLowerCase() === keyLastName;

      // Nếu nhập đủ 2 ô -> phải khớp CẢ HAI (AND)
      // Nếu chỉ nhập 1 ô -> chỉ cần khớp ô đó là đủ (OR)
      return isBothFieldsFilled
        ? (isFirstNameMatch && isLastNameMatch)
        : (isFirstNameMatch || isLastNameMatch);
    });
  }

</script>

</html>
