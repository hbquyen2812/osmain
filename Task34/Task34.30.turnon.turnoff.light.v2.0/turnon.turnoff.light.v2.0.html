<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <script>
        "use strict";
        $(document).ready(function () {
            /*** REGION 1 - Global variables - Vùng khai báo biến, hằng số, tham số TOÀN CỤC */
            const gLIGHT_ON_SRC = "images/pic_bulbon.gif";
            const gLIGHT_OFF_SRC = "images/pic_bulboff.gif";

            /*** REGION 2 - Vùng gán / thực thi sự kiện cho các elements */
            onPageLoading();
            $("#btnTurnOn").click(onBtnTurnOnClick);
            $("#btnTurnOff").click(onBtnTurnOffClick);

            /*** REGION 3 - Event handlers - Vùng khai báo các hàm xử lý sự kiện */
            function onBtnTurnOnClick() {
                $("#imgLight").attr("src", gLIGHT_ON_SRC);
            }
            function onBtnTurnOffClick() {
                $("#imgLight").attr("src", gLIGHT_OFF_SRC);
            }
            /*** REGION 4 - Common funtions - Vùng khai báo hàm dùng chung trong toàn bộ chương trình*/
            function onPageLoading() {
                $("#imgLight").attr("src", gLIGHT_OFF_SRC);
            }
        });

    </script>
</head>

<body>
    <div class="container">
        <div class="d-flex justify-content-center">
            <div class="d-flex align-items-end">
                <button id="btnTurnOn" class="btn btn-warning">Bật đèn</button>
                <img id="imgLight" src="images/pic_bulboff.gif" alt="light image" width="150px">
                <button id="btnTurnOff" class="btn btn-secondary">Tắt đèn</button>
            </div>
        </div>
    </div>
</body>

</html>
