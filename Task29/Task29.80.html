<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 29.80</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body onload="onPageLoading()">
    <div class="container">
        <div class="form-group p-2">
            <a href="Task29.60.html" class="font-weight-bold">QUAY LẠI</a>
        </div>
        <h1 class="text-center">Cập nhật thông tin người dùng</h1>
                <div class="form-group">
            <label>ID:</label>
            <input type="text" class="form-control" id="user-id" readonly>
        </div>
        <div class="form-group">
            <label>Firstname:</label>
            <input type="text" class="form-control" id="user-firstname">
        </div>
        <div class="form-group">
            <label>Lastname:</label>
            <input type="text" class="form-control" id="user-lastname">
        </div>
        <div class="form-group">
            <label>Country:</label>
            <input type="text" class="form-control" id="user-country">
        </div>
        <div class="form-group">
            <label>Subject:</label>
            <input type="text" class="form-control" id="user-subject">
        </div>
        <div class="form-group">
            <button class="btn btn-primary" id="btn-update">Sửa</button>
        </div>
    </div>
</body>
</html>

    <script>
        "use strict";

        // REGION 1 - Khai báo biến, hằng số toàn cục
        const gREQUEST_STATUS_OK = 200;
        const gREQUEST_READY_STATUS_FINISH_AND_OK = 4;
        const gBASE_URL = "http://203.171.20.210:8080/devcamp-register-java-api/users";

        // REGION 2 - Gán / thực thi sự kiện cho các elements
        document.getElementById("btn-update").addEventListener("click", function(){
            onClickUpdateButton();
        });
        // REGION 3 - Khai báo các hàm xử lý sự kiện
        function onPageLoading(){
            "use strict";
            var vUrlString = window.location.href;
            var vUrl = new URL(vUrlString);

            var vUserId = vUrl.searchParams.get("id");
            console.log("User ID nhận được: " + vUserId);

            if (vUserId == null || vUserId == "") {
                alert("Không tìm thấy ID người dùng! Quay lại trang danh sách.");
                window.location.href = "Task29.60.html";
                return;
            }

            var vXmlRequest = new XMLHttpRequest();
            callApiGetUserById(vXmlRequest, vUserId);

            vXmlRequest.onreadystatechange = function(){
                if (this.readyState == gREQUEST_READY_STATUS_FINISH_AND_OK && this.status == gREQUEST_STATUS_OK){
                    console.log(vXmlRequest.responseText);
                    showUserDetailOnForm(vXmlRequest);
                }
            }
        }

        function onClickUpdateButton(){
            "use strict";
            // Thu thập dữ liệu từ form
            var vUserId = document.getElementById("user-id").value;
            var vFirstname = document.getElementById("user-firstname").value;
            var vLastname = document.getElementById("user-lastname").value;
            var vCountry = document.getElementById("user-country").value;
            var vSubject = document.getElementById("user-subject").value;

            // Validate - kiểm tra không được để trống
            if (vFirstname == "" || vLastname == "" || vCountry == "" || vSubject == "") {
                alert("Vui lòng điền đầy đủ thông tin!");
                return;
            }

            console.log("Dữ liệu hợp lệ, sẵn sàng update");
            console.log("ID: " + vUserId);
            console.log("Firstname: " + vFirstname);
            console.log("Lastname: " + vLastname);
            console.log("Country: " + vCountry);
            console.log("Subject: " + vSubject);
            callApiUpdateUser(vUserId, vFirstname, vLastname, vCountry, vSubject);

        }

        // REGION 4 - Các hàm dùng chung cho toàn bộ chương trình
        function callApiGetUserById(paramXmlHttp, paramUserId){
            "use strict";
            var vUrl = gBASE_URL + "/" + paramUserId;
            paramXmlHttp.open("GET", vUrl, true);
            paramXmlHttp.send();
        }

        function showUserDetailOnForm(paramXmlHttp){
            "use strict";
            var vUser = JSON.parse(paramXmlHttp.responseText);

            document.getElementById("user-id").value = vUser.id;
            document.getElementById("user-firstname").value = vUser.firstname;
            document.getElementById("user-lastname").value = vUser.lastname;
            document.getElementById("user-country").value = vUser.country;
            document.getElementById("user-subject").value = vUser.subject;
        }

        function callApiUpdateUser(paramUserId, paramFirstname, paramLastname, paramCountry, paramSubject){
            "use strict";
            var vXmlRequest = new XMLHttpRequest();
            var vUrl = gBASE_URL + "/" + paramUserId;

            vXmlRequest.open("PUT", vUrl, true);
            vXmlRequest.setRequestHeader("Content-Type", "application/json");

            var vData = JSON.stringify({
                "firstname": paramFirstname,
                "lastname": paramLastname,
                "country": paramCountry,
                "subject": paramSubject
            });

            vXmlRequest.send(vData);

            vXmlRequest.onreadystatechange = function(){
                if (this.readyState == gREQUEST_READY_STATUS_FINISH_AND_OK){
                    if (this.status == gREQUEST_STATUS_OK){
                        alert("Cập nhật thành công!");
                        window.location.href = "Task29.60.html";
                    } else {
                        alert("Cập nhật thất bại! Lỗi: " + this.status);
                    }
                }
            }
        }
    </script>
